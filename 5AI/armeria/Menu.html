        <script>
            
           document.addEventListener("DOMContentLoaded", function() {
            let recensioni = [
                { recensione: "Servizio eccellente!", stelle: 5 },
                { recensione: "Buona qualità ma tempi lunghi.", stelle: 3 },
                { recensione: "Personale molto competente.", stelle: 4 },
                { recensione: "Esperienza discreta.", stelle: 2 },
                { recensione: "Perfetto sotto ogni aspetto!", stelle: 5 },
                { recensione: "Non sono rimasto soddisfatto.", stelle: 1 }
                ];
            //funzione generazione stelle
            function generaStelle(voto) {
                let stelle ="" //tieni il "" se no inizia con "undefined"
                for (let i = 0; i <voto; i++) {
                    stelle += "☆";
                }
                return stelle;
                }

            let random = Math.floor(Math.random() * recensioni.length);
            let Rec_scelta = recensioni[random];

            document.getElementById("recensione").innerHTML = generaStelle(Rec_scelta.stelle) + " " + Rec_scelta.recensione;
            });
        </script>
    </head>
